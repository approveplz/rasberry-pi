# Media Server Stack
# Radarr (movies) + Sonarr (TV) → Jackett (search) → qBittorrent (download) → Plex (stream)
# FlareSolverr helps Jackett bypass Cloudflare-protected indexers

services:
  # RADARR SERVICE - Movie download management and organization
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr

    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=Etc/UTC

    volumes:
      - ./config/radarr:/config
      - /mnt/seagate/media-server:/media

    ports:
      - "7878:7878"

    depends_on:
      jackett:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy

    healthcheck:
      test: curl -f http://localhost:7878/ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    mem_limit: 1g
    restart: unless-stopped

  # SONARR SERVICE - TV show download management and organization
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr

    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=Etc/UTC

    volumes:
      - ./config/sonarr:/config
      - /mnt/seagate/media-server:/media

    ports:
      - "8989:8989"

    depends_on:
      jackett:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy

    healthcheck:
      test: curl -f http://localhost:8989/ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    mem_limit: 1g
    restart: unless-stopped

  # JACKETT SERVICE - Torrent indexer (searches torrent sites for you)
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett

    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=Etc/UTC

    volumes:
      - ./config/jackett:/config
      - /mnt/seagate/media-server:/media

    ports:
      - "9117:9117"

    depends_on:
      flaresolverr:
        condition: service_healthy

    healthcheck:
      test: curl -f http://localhost:9117/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    mem_limit: 512m
    restart: unless-stopped

  # QBITTORRENT SERVICE - The actual torrent downloading client
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent

    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=Etc/UTC
      - WEBUI_PORT=8080

    volumes:
      - ./config/qbittorrent:/config
      - /mnt/seagate/media-server:/media

    ports:
      - "8080:8080"
      - "51413:51413"
      - "51413:51413/udp"

    healthcheck:
      test: curl -f http://localhost:8080 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    mem_limit: 1g
    restart: unless-stopped

  # FLARESOLVERR SERVICE - Bypasses Cloudflare protection for Jackett
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr

    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=Etc/UTC

    ports:
      - "8191:8191"

    healthcheck:
      test: curl -f http://localhost:8191 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    mem_limit: 512m
    restart: unless-stopped

  # PLEX SERVICE - Media server (like your own Netflix)
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex

    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=Etc/UTC
      - PLEX_CLAIM=${PLEX_CLAIM:-}

    volumes:
      - ./config/plex:/config
      - /mnt/seagate/media-server:/media

    ports:
      - "32400:32400"
      - "1900:1900/udp"
      - "3005:3005"
      - "8324:8324"
      # Note: 5353/udp (mDNS) removed — conflicts with Pi's Avahi daemon

    healthcheck:
      test: curl -f http://localhost:32400/identity || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    mem_limit: 1g
    restart: unless-stopped

  # OPENCLAW SERVICE - AI assistant (media manager via chat)
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:2026.3.11
    container_name: openclaw-gateway

    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NODE_OPTIONS=--max-old-space-size=1536
      - NODE_COMPILE_CACHE=/var/tmp/openclaw-compile-cache
      - OPENCLAW_NO_RESPAWN=1
      - TZ=Etc/UTC

    volumes:
      - ./config/openclaw:/home/node/.openclaw
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/seagate:/mnt/seagate:ro
      - /sys:/host-sys:ro

    ports:
      - "18789:18789"

    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    mem_limit: 2g
    restart: unless-stopped

  # OPENCLAW CLI - Interactive commands and onboarding (not always-on)
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:2026.3.11
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NODE_OPTIONS=--max-old-space-size=1536
      - TZ=Etc/UTC

    volumes:
      - ./config/openclaw:/home/node/.openclaw

    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    mem_limit: 2g

    depends_on:
      - openclaw-gateway

# DOCKER NETWORKS: Create a custom network so all containers can communicate
# Docker automatically creates DNS entries so "jackett" resolves to the jackett container
networks:
  default:
    name: media-network
